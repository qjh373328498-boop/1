<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="robot" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="human" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9966;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff5500;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  
  <!-- Grid lines -->
  <g stroke="#2a2a4e" stroke-width="1" opacity="0.3">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="700" y1="0" x2="700" y2="600"/>
  </g>
  
  <!-- AI Assistant (Robot) -->
  <g transform="translate(200, 250)" filter="url(#glow)">
    <!-- Head -->
    <circle cx="0" cy="0" r="60" fill="url(#robot)"/>
    <!-- Eyes -->
    <ellipse cx="-20" cy="-10" rx="12" ry="15" fill="#fff"/>
    <ellipse cx="20" cy="-10" rx="12" ry="15" fill="#fff"/>
    <circle cx="-20" cy="-10" r="6" fill="#1a1a2e"/>
    <circle cx="20" cy="-10" r="6" fill="#1a1a2e"/>
    <!-- Antenna -->
    <rect x="-3" y="-70" width="6" height="30" fill="url(#robot)"/>
    <circle cx="0" cy="-70" r="8" fill="#00ff88"/>
    <!-- Body -->
    <rect x="-40" y="65" width="80" height="80" rx="15" fill="url(#robot)"/>
    <!-- Screen on body -->
    <rect x="-25" y="80" width="50" height="40" rx="5" fill="#1a1a2e"/>
    <text x="0" y="105" text-anchor="middle" fill="#00ff88" font-size="12" font-family="monospace">AI</text>
  </g>
  
  <!-- Human User -->
  <g transform="translate(600, 250)" filter="url(#glow)">
    <!-- Head -->
    <circle cx="0" cy="0" r="50" fill="url(#human)"/>
    <!-- Hair -->
    <path d="M -50,-20 Q -30,-60 0,-55 Q 30,-60 50,-20" fill="#333"/>
    <!-- Eyes -->
    <ellipse cx="-15" cy="-5" rx="8" ry="10" fill="#fff"/>
    <ellipse cx="15" cy="-5" rx="8" ry="10" fill="#fff"/>
    <circle cx="-15" cy="-5" r="4" fill="#1a1a2e"/>
    <circle cx="15" cy="-5" r="4" fill="#1a1a2e"/>
    <!-- Smile -->
    <path d="M -20,20 Q 0,35 20,20" stroke="#fff" stroke-width="3" fill="none"/>
    <!-- Body -->
    <path d="M -35,55 L -45,150 L 45,150 L 35,55 Z" fill="#4a90d9"/>
  </g>
  
  <!-- Connection beam -->
  <g>
    <line x1="280" y1="250" x2="550" y2="250" stroke="#00ff88" stroke-width="4" opacity="0.6">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2s" repeatCount="indefinite"/>
    </line>
    <!-- Data packets -->
    <circle r="6" fill="#00ff88">
      <animateMotion dur="1.5s" repeatCount="indefinite" path="M 280,250 L 550,250"/>
    </circle>
    <circle r="6" fill="#00ff88">
      <animateMotion dur="1.5s" repeatCount="indefinite" begin="0.5s" path="M 280,250 L 550,250"/>
    </circle>
    <circle r="6" fill="#00ff88">
      <animateMotion dur="1.5s" repeatCount="indefinite" begin="1s" path="M 280,250 L 550,250"/>
    </circle>
  </g>
  
  <!-- Task icons floating around AI -->
  <g transform="translate(100, 150)">
    <rect x="-25" y="-25" width="50" height="50" rx="10" fill="#2a2a4e" stroke="#00d9ff" stroke-width="2"/>
    <text x="0" y="8" text-anchor="middle" fill="#fff" font-size="24">📝</text>
    <text x="0" y="45" text-anchor="middle" fill="#aaa" font-size="10">写作</text>
  </g>
  
  <g transform="translate(120, 450)">
    <rect x="-25" y="-25" width="50" height="50" rx="10" fill="#2a2a4e" stroke="#00d9ff" stroke-width="2"/>
    <text x="0" y="8" text-anchor="middle" fill="#fff" font-size="24">📊</text>
    <text x="0" y="45" text-anchor="middle" fill="#aaa" font-size="10">分析</text>
  </g>
  
  <g transform="translate(350, 380)">
    <rect x="-25" y="-25" width="50" height="50" rx="10" fill="#2a2a4e" stroke="#00d9ff" stroke-width="2"/>
    <text x="0" y="8" text-anchor="middle" fill="#fff" font-size="24">💻</text>
    <text x="0" y="45" text-anchor="middle" fill="#aaa" font-size="10">编程</text>
  </g>
  
  <!-- Speech bubble from human -->
  <g transform="translate(650, 120)">
    <path d="M -80,-40 Q -80,-70 -50,-70 L 50,-70 Q 80,-70 80,-40 L 80,20 Q 80,50 50,50 L 20,50 L 0,70 L -20,50 L -50,50 Q -80,50 -80,20 Z" fill="#fff"/>
    <text x="0" y="-20" text-anchor="middle" fill="#333" font-size="14" font-family="sans-serif">帮我分析这个数据</text>
    <text x="0" y="5" text-anchor="middle" fill="#666" font-size="12" font-family="sans-serif">并生成一份报告</text>
  </g>
  
  <!-- Speech bubble from AI -->
  <g transform="translate(150, 380)">
    <path d="M -60,-30 Q -60,-55 -35,-55 L 35,-55 Q 60,-55 60,-30 L 60,15 Q 60,40 35,40 L 10,40 L 0,55 L -10,40 L -35,40 Q -60,40 -60,15 Z" fill="#00d9ff"/>
    <text x="0" y="-10" text-anchor="middle" fill="#fff" font-size="12" font-family="sans-serif">好的！正在分析...</text>
    <text x="0" y="15" text-anchor="middle" fill="#fff" font-size="12" font-family="sans-serif">预计 2 分钟完成</text>
  </g>
  
  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" fill="#fff" font-size="24" font-family="sans-serif" font-weight="bold">AI Assistant Workflow</text>
  <text x="400" y="570" text-anchor="middle" fill="#666" font-size="12" font-family="monospace">Generated by monkeycode-ai</text>
</svg>
